<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line {
      fill: none;
      stroke: #22cc77;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .grid {
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 0.5;
    }
    .candle {
      stroke: #444;
      stroke-width: 1;
    }
    .candle-up {
      fill: rgba(0, 255, 100, 0.3);
      stroke: rgba(0, 255, 100, 0.8);
    }
    .candle-down {
      fill: rgba(255, 50, 50, 0.3);
      stroke: rgba(255, 50, 50, 0.8);
    }
    .annotation {
      fill: none;
      stroke: rgba(255, 255, 255, 0.6);
      stroke-width: 1.5;
      stroke-dasharray: 3,3;
    }
    .annotation-text {
      font-family: monospace;
      font-size: 12px;
      fill: rgba(255, 255, 255, 0.8);
    }
    .flag {
      fill: none;
      stroke: rgba(34, 204, 119, 0.5);
      stroke-width: 1.5;
      stroke-dasharray: 5,3;
    }
    .flag-fill {
      fill: rgba(34, 204, 119, 0.1);
      stroke: none;
    }
  </style>
  
  <rect width="400" height="200" fill="#1a1a1a"/>
  
  <!-- Grid lines -->
  <g>
    <line x1="0" y1="40" x2="400" y2="40" class="grid"/>
    <line x1="0" y1="80" x2="400" y2="80" class="grid"/>
    <line x1="0" y1="120" x2="400" y2="120" class="grid"/>
    <line x1="0" y1="160" x2="400" y2="160" class="grid"/>
    
    <line x1="50" y1="0" x2="50" y2="200" class="grid"/>
    <line x1="100" y1="0" x2="100" y2="200" class="grid"/>
    <line x1="150" y1="0" x2="150" y2="200" class="grid"/>
    <line x1="200" y1="0" x2="200" y2="200" class="grid"/>
    <line x1="250" y1="0" x2="250" y2="200" class="grid"/>
    <line x1="300" y1="0" x2="300" y2="200" class="grid"/>
    <line x1="350" y1="0" x2="350" y2="200" class="grid"/>
  </g>
  
  <!-- Candles -->
  <g>
    <line x1="20" y1="160" x2="20" y2="130" class="candle"/>
    <rect x="17" y="130" width="6" height="20" class="candle-up"/>
    
    <line x1="40" y1="130" x2="40" y2="100" class="candle"/>
    <rect x="37" y="100" width="6" height="20" class="candle-up"/>
    
    <line x1="60" y1="100" x2="60" y2="70" class="candle"/>
    <rect x="57" y="70" width="6" height="20" class="candle-up"/>
    
    <line x1="80" y1="70" x2="80" y2="40" class="candle"/>
    <rect x="77" y="40" width="6" height="20" class="candle-up"/>
    
    <!-- Flag/Consolidation phase -->
    <line x1="100" y1="40" x2="100" y2="60" class="candle"/>
    <rect x="97" y="50" width="6" height="20" class="candle-down"/>
    
    <line x1="120" y1="60" x2="120" y2="40" class="candle"/>
    <rect x="117" y="40" width="6" height="15" class="candle-up"/>
    
    <line x1="140" y1="40" x2="140" y2="50" class="candle"/>
    <rect x="137" y="45" width="6" height="15" class="candle-down"/>
    
    <line x1="160" y1="50" x2="160" y2="40" class="candle"/>
    <rect x="157" y="40" width="6" height="10" class="candle-up"/>
    
    <line x1="180" y1="40" x2="180" y2="50" class="candle"/>
    <rect x="177" y="45" width="6" height="10" class="candle-down"/>
    
    <!-- Continuation of trend -->
    <line x1="200" y1="45" x2="200" y2="25" class="candle"/>
    <rect x="197" y="25" width="6" height="15" class="candle-up"/>
    
    <line x1="220" y1="25" x2="220" y2="15" class="candle"/>
    <rect x="217" y="15" width="6" height="10" class="candle-up"/>
    
    <line x1="240" y1="15" x2="240" y2="35" class="candle"/>
    <rect x="237" y="25" width="6" height="15" class="candle-down"/>
    
    <line x1="260" y1="35" x2="260" y2="20" class="candle"/>
    <rect x="257" y="20" width="6" height="10" class="candle-up"/>
    
    <line x1="280" y1="20" x2="280" y2="10" class="candle"/>
    <rect x="277" y="10" width="6" height="10" class="candle-up"/>
    
    <line x1="300" y1="10" x2="300" y2="30" class="candle"/>
    <rect x="297" y="20" width="6" height="15" class="candle-down"/>
    
    <line x1="320" y1="30" x2="320" y2="15" class="candle"/>
    <rect x="317" y="15" width="6" height="10" class="candle-up"/>
    
    <line x1="340" y1="15" x2="340" y2="5" class="candle"/>
    <rect x="337" y="5" width="6" height="10" class="candle-up"/>
  </g>
  
  <!-- Flag/Pennant pattern line -->
  <path d="M20,140 C40,115 60,85 80,50" class="line"/>
  <path d="M200,40 C220,20 240,25 260,25 C280,15 300,20 340,10" class="line"/>
  
  <!-- Flag Annotations -->
  <polygon points="95,40 180,45 180,55 95,60" class="flag-fill"/>
  <path d="M95,40 L180,45" class="flag"/>
  <path d="M95,60 L180,55" class="flag"/>
  
  <line x1="140" y1="45" x2="140" y2="20" class="annotation"/>
  <text x="130" y="15" class="annotation-text">Bull Flag</text>
  
  <text x="210" y="55" class="annotation-text">Breakout</text>
  <path d="M190,45 L210,30" class="annotation"/>
  
  <text x="20" y="180" class="annotation-text">Strong Uptrend (Pole)</text>
  <path d="M40,140 L40,170" class="annotation"/>
  
  <text x="280" y="40" class="annotation-text">Continued Uptrend</text>
  <path d="M280,15 L280,35" class="annotation"/>
</svg>