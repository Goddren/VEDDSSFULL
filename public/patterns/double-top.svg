<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line {
      fill: none;
      stroke: #ff3e66;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .grid {
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 0.5;
    }
    .candle {
      stroke: #444;
      stroke-width: 1;
    }
    .candle-up {
      fill: rgba(0, 255, 100, 0.3);
      stroke: rgba(0, 255, 100, 0.8);
    }
    .candle-down {
      fill: rgba(255, 50, 50, 0.3);
      stroke: rgba(255, 50, 50, 0.8);
    }
    .annotation {
      fill: none;
      stroke: rgba(255, 255, 255, 0.6);
      stroke-width: 1.5;
      stroke-dasharray: 3,3;
    }
    .annotation-text {
      font-family: monospace;
      font-size: 12px;
      fill: rgba(255, 255, 255, 0.8);
    }
  </style>
  
  <rect width="400" height="200" fill="#1a1a1a"/>
  
  <!-- Grid lines -->
  <g>
    <line x1="0" y1="40" x2="400" y2="40" class="grid"/>
    <line x1="0" y1="80" x2="400" y2="80" class="grid"/>
    <line x1="0" y1="120" x2="400" y2="120" class="grid"/>
    <line x1="0" y1="160" x2="400" y2="160" class="grid"/>
    
    <line x1="50" y1="0" x2="50" y2="200" class="grid"/>
    <line x1="100" y1="0" x2="100" y2="200" class="grid"/>
    <line x1="150" y1="0" x2="150" y2="200" class="grid"/>
    <line x1="200" y1="0" x2="200" y2="200" class="grid"/>
    <line x1="250" y1="0" x2="250" y2="200" class="grid"/>
    <line x1="300" y1="0" x2="300" y2="200" class="grid"/>
    <line x1="350" y1="0" x2="350" y2="200" class="grid"/>
  </g>
  
  <!-- Candles -->
  <g>
    <line x1="20" y1="160" x2="20" y2="130" class="candle"/>
    <rect x="17" y="130" width="6" height="20" class="candle-up"/>
    
    <line x1="40" y1="130" x2="40" y2="100" class="candle"/>
    <rect x="37" y="110" width="6" height="20" class="candle-up"/>
    
    <line x1="60" y1="100" x2="60" y2="70" class="candle"/>
    <rect x="57" y="70" width="6" height="20" class="candle-up"/>
    
    <line x1="80" y1="70" x2="80" y2="40" class="candle"/>
    <rect x="77" y="40" width="6" height="20" class="candle-up"/>
    
    <line x1="100" y1="40" x2="100" y2="60" class="candle"/>
    <rect x="97" y="50" width="6" height="20" class="candle-down"/>
    
    <line x1="120" y1="60" x2="120" y2="90" class="candle"/>
    <rect x="117" y="70" width="6" height="20" class="candle-down"/>
    
    <line x1="140" y1="90" x2="140" y2="60" class="candle"/>
    <rect x="137" y="60" width="6" height="20" class="candle-up"/>
    
    <line x1="160" y1="60" x2="160" y2="40" class="candle"/>
    <rect x="157" y="40" width="6" height="10" class="candle-up"/>
    
    <line x1="180" y1="40" x2="180" y2="60" class="candle"/>
    <rect x="177" y="50" width="6" height="20" class="candle-down"/>
    
    <line x1="200" y1="60" x2="200" y2="90" class="candle"/>
    <rect x="197" y="80" width="6" height="20" class="candle-down"/>
    
    <line x1="220" y1="90" x2="220" y2="60" class="candle"/>
    <rect x="217" y="60" width="6" height="20" class="candle-up"/>
    
    <line x1="240" y1="60" x2="240" y2="40" class="candle"/>
    <rect x="237" y="40" width="6" height="10" class="candle-up"/>
    
    <line x1="260" y1="40" x2="260" y2="70" class="candle"/>
    <rect x="257" y="60" width="6" height="20" class="candle-down"/>
    
    <line x1="280" y1="70" x2="280" y2="100" class="candle"/>
    <rect x="277" y="90" width="6" height="20" class="candle-down"/>
    
    <line x1="300" y1="100" x2="300" y2="130" class="candle"/>
    <rect x="297" y="120" width="6" height="20" class="candle-down"/>
    
    <line x1="320" y1="130" x2="320" y2="150" class="candle"/>
    <rect x="317" y="140" width="6" height="20" class="candle-down"/>
    
    <line x1="340" y1="150" x2="340" y2="170" class="candle"/>
    <rect x="337" y="160" width="6" height="20" class="candle-down"/>
  </g>
  
  <!-- Double top line -->
  <path d="M20,150 C40,130 60,80 80,50 C100,40 120,80 140,70 C160,50 180,40 200,70 C220,65 240,45 260,65 C280,90 300,120 320,145 C340,165 360,170 380,170" class="line"/>
  
  <!-- Annotations -->
  <g>
    <line x1="80" y1="40" x2="240" y2="40" class="annotation"/>
    <text x="155" y="30" class="annotation-text">Double Top</text>
    <line x1="160" y1="40" x2="160" y2="15" class="annotation"/>
    <line x1="240" y1="40" x2="240" y2="15" class="annotation"/>
    <line x1="200" y1="80" x2="300" y2="80" class="annotation"/>
    <text x="200" y="95" class="annotation-text">Confirmation Level</text>
  </g>
</svg>