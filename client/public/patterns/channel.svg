<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line {
      fill: none;
      stroke: #9f7aea;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .grid {
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 0.5;
    }
    .candle {
      stroke: #444;
      stroke-width: 1;
    }
    .candle-up {
      fill: rgba(0, 255, 100, 0.3);
      stroke: rgba(0, 255, 100, 0.8);
    }
    .candle-down {
      fill: rgba(255, 50, 50, 0.3);
      stroke: rgba(255, 50, 50, 0.8);
    }
    .annotation {
      fill: none;
      stroke: rgba(255, 255, 255, 0.6);
      stroke-width: 1.5;
      stroke-dasharray: 3,3;
    }
    .annotation-text {
      font-family: monospace;
      font-size: 12px;
      fill: rgba(255, 255, 255, 0.8);
    }
    .channel {
      fill: none;
      stroke: rgba(159, 122, 234, 0.5);
      stroke-width: 1.5;
      stroke-dasharray: 5,3;
    }
    .channel-fill {
      fill: rgba(159, 122, 234, 0.1);
      stroke: none;
    }
  </style>
  
  <rect width="400" height="200" fill="#1a1a1a"/>
  
  <!-- Grid lines -->
  <g>
    <line x1="0" y1="40" x2="400" y2="40" class="grid"/>
    <line x1="0" y1="80" x2="400" y2="80" class="grid"/>
    <line x1="0" y1="120" x2="400" y2="120" class="grid"/>
    <line x1="0" y1="160" x2="400" y2="160" class="grid"/>
    
    <line x1="50" y1="0" x2="50" y2="200" class="grid"/>
    <line x1="100" y1="0" x2="100" y2="200" class="grid"/>
    <line x1="150" y1="0" x2="150" y2="200" class="grid"/>
    <line x1="200" y1="0" x2="200" y2="200" class="grid"/>
    <line x1="250" y1="0" x2="250" y2="200" class="grid"/>
    <line x1="300" y1="0" x2="300" y2="200" class="grid"/>
    <line x1="350" y1="0" x2="350" y2="200" class="grid"/>
  </g>
  
  <!-- Candles -->
  <g>
    <line x1="20" y1="160" x2="20" y2="140" class="candle"/>
    <rect x="17" y="140" width="6" height="15" class="candle-up"/>
    
    <line x1="40" y1="140" x2="40" y2="150" class="candle"/>
    <rect x="37" y="145" width="6" height="10" class="candle-down"/>
    
    <line x1="60" y1="150" x2="60" y2="130" class="candle"/>
    <rect x="57" y="130" width="6" height="15" class="candle-up"/>
    
    <line x1="80" y1="130" x2="80" y2="140" class="candle"/>
    <rect x="77" y="135" width="6" height="10" class="candle-down"/>
    
    <line x1="100" y1="140" x2="100" y2="120" class="candle"/>
    <rect x="97" y="120" width="6" height="15" class="candle-up"/>
    
    <line x1="120" y1="120" x2="120" y2="130" class="candle"/>
    <rect x="117" y="125" width="6" height="10" class="candle-down"/>
    
    <line x1="140" y1="130" x2="140" y2="110" class="candle"/>
    <rect x="137" y="110" width="6" height="15" class="candle-up"/>
    
    <line x1="160" y1="110" x2="160" y2="120" class="candle"/>
    <rect x="157" y="115" width="6" height="10" class="candle-down"/>
    
    <line x1="180" y1="120" x2="180" y2="100" class="candle"/>
    <rect x="177" y="100" width="6" height="15" class="candle-up"/>
    
    <line x1="200" y1="100" x2="200" y2="110" class="candle"/>
    <rect x="197" y="105" width="6" height="10" class="candle-down"/>
    
    <line x1="220" y1="110" x2="220" y2="90" class="candle"/>
    <rect x="217" y="90" width="6" height="15" class="candle-up"/>
    
    <line x1="240" y1="90" x2="240" y2="100" class="candle"/>
    <rect x="237" y="95" width="6" height="10" class="candle-down"/>
    
    <line x1="260" y1="100" x2="260" y2="80" class="candle"/>
    <rect x="257" y="80" width="6" height="15" class="candle-up"/>
    
    <line x1="280" y1="80" x2="280" y2="90" class="candle"/>
    <rect x="277" y="85" width="6" height="10" class="candle-down"/>
    
    <line x1="300" y1="90" x2="300" y2="70" class="candle"/>
    <rect x="297" y="70" width="6" height="15" class="candle-up"/>
    
    <line x1="320" y1="70" x2="320" y2="80" class="candle"/>
    <rect x="317" y="75" width="6" height="10" class="candle-down"/>
    
    <line x1="340" y1="80" x2="340" y2="60" class="candle"/>
    <rect x="337" y="60" width="6" height="15" class="candle-up"/>
  </g>
  
  <!-- Channel pattern -->
  <path d="M20,150 C60,135 100,125 140,115 C180,105 220,95 260,85 C300,75 340,65 380,55" class="line"/>
  
  <!-- Channel Annotations -->
  <polygon points="20,130 20,150 380,55 380,35" class="channel-fill"/>
  <path d="M20,130 L380,35" class="channel"/>
  <path d="M20,150 L380,55" class="channel"/>
  
  <line x1="180" y1="90" x2="180" y2="60" class="annotation"/>
  <text x="150" y="55" class="annotation-text">Ascending Channel</text>
  
  <text x="80" y="155" class="annotation-text">Support Line</text>
  <text x="80" y="115" class="annotation-text">Resistance Line</text>
  
  <text x="250" y="135" class="annotation-text">Trading Range</text>
  <path d="M240,115 L240,90" class="annotation"/>
</svg>