<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line {
      fill: none;
      stroke: #4dc0b5;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .grid {
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 0.5;
    }
    .candle {
      stroke: #444;
      stroke-width: 1;
    }
    .candle-up {
      fill: rgba(0, 255, 100, 0.3);
      stroke: rgba(0, 255, 100, 0.8);
    }
    .candle-down {
      fill: rgba(255, 50, 50, 0.3);
      stroke: rgba(255, 50, 50, 0.8);
    }
    .annotation {
      fill: none;
      stroke: rgba(255, 255, 255, 0.6);
      stroke-width: 1.5;
      stroke-dasharray: 3,3;
    }
    .annotation-text {
      font-family: monospace;
      font-size: 12px;
      fill: rgba(255, 255, 255, 0.8);
    }
    .wedge {
      fill: none;
      stroke: rgba(77, 192, 181, 0.5);
      stroke-width: 1.5;
      stroke-dasharray: 5,3;
    }
    .wedge-fill {
      fill: rgba(77, 192, 181, 0.1);
      stroke: none;
    }
    .breakout {
      fill: none;
      stroke: rgba(0, 255, 100, 0.8);
      stroke-width: 2;
      stroke-dasharray: none;
    }
  </style>
  
  <rect width="400" height="200" fill="#1a1a1a"/>
  
  <!-- Grid lines -->
  <g>
    <line x1="0" y1="40" x2="400" y2="40" class="grid"/>
    <line x1="0" y1="80" x2="400" y2="80" class="grid"/>
    <line x1="0" y1="120" x2="400" y2="120" class="grid"/>
    <line x1="0" y1="160" x2="400" y2="160" class="grid"/>
    
    <line x1="50" y1="0" x2="50" y2="200" class="grid"/>
    <line x1="100" y1="0" x2="100" y2="200" class="grid"/>
    <line x1="150" y1="0" x2="150" y2="200" class="grid"/>
    <line x1="200" y1="0" x2="200" y2="200" class="grid"/>
    <line x1="250" y1="0" x2="250" y2="200" class="grid"/>
    <line x1="300" y1="0" x2="300" y2="200" class="grid"/>
    <line x1="350" y1="0" x2="350" y2="200" class="grid"/>
  </g>
  
  <!-- Candles for a falling wedge -->
  <g>
    <line x1="20" y1="40" x2="20" y2="60" class="candle"/>
    <rect x="17" y="50" width="6" height="15" class="candle-down"/>
    
    <line x1="40" y1="60" x2="40" y2="80" class="candle"/>
    <rect x="37" y="70" width="6" height="15" class="candle-down"/>
    
    <line x1="60" y1="80" x2="60" y2="70" class="candle"/>
    <rect x="57" y="70" width="6" height="10" class="candle-up"/>
    
    <line x1="80" y1="70" x2="80" y2="90" class="candle"/>
    <rect x="77" y="80" width="6" height="15" class="candle-down"/>
    
    <line x1="100" y1="90" x2="100" y2="80" class="candle"/>
    <rect x="97" y="80" width="6" height="10" class="candle-up"/>
    
    <line x1="120" y1="80" x2="120" y2="100" class="candle"/>
    <rect x="117" y="90" width="6" height="15" class="candle-down"/>
    
    <line x1="140" y1="100" x2="140" y2="90" class="candle"/>
    <rect x="137" y="90" width="6" height="10" class="candle-up"/>
    
    <line x1="160" y1="90" x2="160" y2="105" class="candle"/>
    <rect x="157" y="95" width="6" height="15" class="candle-down"/>
    
    <line x1="180" y1="105" x2="180" y2="95" class="candle"/>
    <rect x="177" y="95" width="6" height="10" class="candle-up"/>
    
    <line x1="200" y1="95" x2="200" y2="110" class="candle"/>
    <rect x="197" y="100" width="6" height="15" class="candle-down"/>
    
    <line x1="220" y1="110" x2="220" y2="100" class="candle"/>
    <rect x="217" y="100" width="6" height="10" class="candle-up"/>
    
    <line x1="240" y1="100" x2="240" y2="115" class="candle"/>
    <rect x="237" y="105" width="6" height="15" class="candle-down"/>
    
    <line x1="260" y1="105" x2="260" y2="95" class="candle"/>
    <rect x="257" y="95" width="6" height="10" class="candle-up"/>
    
    <!-- Breakout candles -->
    <line x1="280" y1="95" x2="280" y2="75" class="candle"/>
    <rect x="277" y="75" width="6" height="15" class="candle-up"/>
    
    <line x1="300" y1="75" x2="300" y2="55" class="candle"/>
    <rect x="297" y="55" width="6" height="15" class="candle-up"/>
    
    <line x1="320" y1="55" x2="320" y2="45" class="candle"/>
    <rect x="317" y="45" width="6" height="10" class="candle-up"/>
    
    <line x1="340" y1="45" x2="340" y2="65" class="candle"/>
    <rect x="337" y="55" width="6" height="15" class="candle-down"/>
  </g>
  
  <!-- Wedge pattern line -->
  <path d="M20,50 C40,65 60,75 80,85 C100,85 120,95 140,95 C160,100 180,100 200,105 C220,105 240,110 260,100" class="line"/>
  <path d="M260,100 C280,80 300,65 340,50" class="breakout"/>
  
  <!-- Wedge Annotations -->
  <polygon points="20,30 20,50 260,100 260,120" class="wedge-fill"/>
  <path d="M20,30 L260,120" class="wedge"/>
  <path d="M20,50 L260,100" class="wedge"/>
  
  <line x1="150" y1="80" x2="150" y2="45" class="annotation"/>
  <text x="105" y="40" class="annotation-text">Falling Wedge (Bullish)</text>
  
  <line x1="280" y1="75" x2="280" y2="45" class="annotation"/>
  <text x="275" y="40" class="annotation-text">Breakout</text>
  
  <text x="70" y="120" class="annotation-text">Converging Trendlines</text>
</svg>